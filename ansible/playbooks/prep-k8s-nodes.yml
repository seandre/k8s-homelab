---
- name: Prepare Ubuntu nodes for Kubernetes
  hosts: k3s_cluster
  become: true
  gather_facts: true
  tasks:
    - name: Update apt package cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Fully upgrade installed packages
      ansible.builtin.apt:
        upgrade: full

    - name: Install base packages used by Kubernetes and diagnostics
      ansible.builtin.apt:
        name:
          - curl
          - ca-certificates
          - gnupg
          - lsb-release
          - vim
          - htop
          - net-tools
          - qemu-guest-agent
        state: present

    - name: Disable active swap for Kubernetes
      ansible.builtin.command: swapoff -a
      changed_when: false
      when: ansible_swaptotal_mb | int > 0

    - name: Comment swap entries in fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#]\S+\s+\S+\s+swap\s+.*)$'
        replace: '# \1'

    - name: Persist required Kubernetes kernel modules
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          overlay
          br_netfilter

    - name: Load required Kubernetes kernel modules now
      ansible.builtin.command: "modprobe {{ item }}"
      changed_when: false
      loop:
        - overlay
        - br_netfilter

    - name: Configure Kubernetes networking sysctls
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-kubernetes.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1

    - name: Apply Kubernetes networking sysctls
      ansible.builtin.command: sysctl --system
      changed_when: false

    - name: Ensure qemu guest agent is running
      ansible.builtin.systemd_service:
        name: qemu-guest-agent
        state: started
