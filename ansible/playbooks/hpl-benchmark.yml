---
- name: Initialize HPL benchmark run
  hosts: localhost
  connection: local
  gather_facts: false
  tags:
    - always
  tasks:
    - name: Select benchmark run identifier
      ansible.builtin.set_fact:
        hpl_effective_run_id: >-
          {{ hpl_run_id | default(lookup('ansible.builtin.pipe', 'date -u +%Y%m%dT%H%M%SZ'), true) }}

    - name: Set local benchmark result directory
      ansible.builtin.set_fact:
        hpl_local_result_dir: >-
          {{ playbook_dir ~ '/../../benchmark-results/' ~ hpl_effective_run_id }}

    - name: Validate benchmark run identifier
      ansible.builtin.assert:
        that:
          - hpl_effective_run_id is match('^[A-Za-z0-9][A-Za-z0-9._-]*$')
        fail_msg: "hpl_run_id may contain only letters, numbers, dots, underscores, and hyphens."

    - name: Read controller hostname
      ansible.builtin.command:
        argv:
          - hostname
          - -s
      register: hpl_controller_hostname
      changed_when: false
      when: "'isolated' in ansible_run_tags or 'all' in ansible_run_tags"

    - name: Require explicit outage approval from a workstation
      ansible.builtin.assert:
        that:
          - hpl_allow_k3s_outage | default(false) | bool
          - hpl_controller_hostname.stdout | lower != 'utility-01'
        fail_msg: >-
          The isolated pass stops k3s and utility-01. Launch it from the
          workstation with -e hpl_allow_k3s_outage=true; utility-01 is not an
          allowed Ansible controller for this stage.
      when: "'isolated' in ansible_run_tags or 'all' in ansible_run_tags"

    - name: Create local benchmark result directory
      ansible.builtin.file:
        path: "{{ hpl_local_result_dir }}"
        state: directory
        mode: "0750"

- name: Prepare the pinned top500 HPL stack
  hosts: benchmark_all
  gather_facts: true
  become: true
  tags:
    - prepare
  roles:
    - role: hpl

- name: Run one correctness smoke test per node
  hosts: benchmark_all
  gather_facts: false
  serial: 1
  tags:
    - smoke
  vars:
    hpl_effective_run_id: "{{ hostvars['localhost'].hpl_effective_run_id }}"
  tasks:
    - name: Execute per-node correctness smoke test
      ansible.builtin.include_role:
        name: hpl
        tasks_from: run_case
      vars:
        hpl_case_label: smoke
        hpl_case_stage: smoke
        hpl_case_comparison: correctness
        hpl_case_target: "{{ inventory_hostname }}"
        hpl_case_cpu_family: "{{ hpl_cpu_family }}"
        hpl_case_n: 7680
        hpl_case_nb: 192
        hpl_case_ranks: "{{ hpl_ranks }}"
        hpl_case_p: "{{ hpl_process_p }}"
        hpl_case_q: "{{ hpl_process_q }}"
        hpl_case_warmups: 0
        hpl_case_runs: 1

- name: Measure live k3s nodes sequentially
  hosts: benchmark_k3s
  gather_facts: false
  serial: 1
  order: inventory
  tags:
    - live
  vars:
    hpl_effective_run_id: "{{ hostvars['localhost'].hpl_effective_run_id }}"
  tasks:
    - name: Capture k3s state before live node run
      ansible.builtin.include_role:
        name: hpl
        tasks_from: capture_k3s
      vars:
        hpl_capture_label: "live-before-{{ inventory_hostname }}"

    - name: Execute live case with mandatory node validation
      block:
        - name: Execute live per-node standard comparison
          ansible.builtin.include_role:
            name: hpl
            tasks_from: run_case
          vars:
            hpl_case_label: live-standard
            hpl_case_stage: live-node
            hpl_case_comparison: standard
            hpl_case_target: "{{ inventory_hostname }}"
            hpl_case_cpu_family: "{{ hpl_cpu_family }}"
            hpl_case_n: 21504
            hpl_case_nb: 192
            hpl_case_ranks: "{{ hpl_ranks }}"
            hpl_case_p: "{{ hpl_process_p }}"
            hpl_case_q: "{{ hpl_process_q }}"
            hpl_case_warmups: 1
            hpl_case_runs: 3
      always:
        - name: Require every Kubernetes node to remain Ready
          ansible.builtin.command:
            argv:
              - k3s
              - kubectl
              - wait
              - --for=condition=Ready
              - nodes
              - --all
              - --timeout=180s
          register: hpl_live_nodes_ready
          changed_when: false
          failed_when: false
          delegate_to: "{{ groups['k3s_control'][0] }}"
          become: true

        - name: Read live Kubernetes node set
          ansible.builtin.command:
            argv:
              - k3s
              - kubectl
              - get
              - nodes
              - -o
              - name
          register: hpl_live_node_set
          changed_when: false
          failed_when: false
          delegate_to: "{{ groups['k3s_control'][0] }}"
          become: true

        - name: Capture k3s state after live node run
          ansible.builtin.include_role:
            name: hpl
            tasks_from: capture_k3s
          vars:
            hpl_capture_label: "live-after-{{ inventory_hostname }}"

        - name: Enforce live Kubernetes node acceptance
          ansible.builtin.assert:
            that:
              - hpl_live_nodes_ready.rc == 0
              - hpl_live_node_set.rc == 0
              - hpl_live_node_set.stdout_lines | length == groups['k3s_cluster'] | length
            fail_msg: >-
              The live HPL run did not preserve the complete Ready Kubernetes node set.

- name: Run maintenance-isolated HPL matrix with guaranteed recovery
  hosts: localhost
  connection: local
  gather_facts: false
  tags:
    - isolated
  vars:
    hpl_effective_run_id: "{{ hostvars['localhost'].hpl_effective_run_id }}"
    hpl_stop_order: "{{ groups['k3s_workers'] + groups['k3s_control'] }}"
    hpl_network_groups:
      - name: benchmark_k3s
        members: "{{ groups['benchmark_k3s'] }}"
      - name: benchmark_baremetal
        members: "{{ groups['benchmark_baremetal'] }}"
  tasks:
    - name: Initialize isolated failure state
      ansible.builtin.set_fact:
        hpl_isolated_failed: false

    - name: Execute isolated matrix
      block:
        - name: Capture pre-isolation k3s state
          ansible.builtin.include_role:
            name: hpl
            tasks_from: capture_k3s
          vars:
            hpl_capture_label: isolated-before

        - name: Capture pre-isolation benchmark host state
          ansible.builtin.include_role:
            name: hpl
            tasks_from: capture_host
          loop: "{{ groups['benchmark_all'] }}"
          loop_control:
            loop_var: hpl_capture_host
            label: "{{ hpl_capture_host }}"
          vars:
            hpl_capture_label: isolated-before

        - name: Create Proxmox isolation-state directory
          ansible.builtin.file:
            path: "{{ hpl_result_root }}/{{ hpl_effective_run_id }}/proxmox-state"
            state: directory
            owner: root
            group: root
            mode: "0750"
          delegate_to: "{{ proxmox_host }}"
          become: true

        - name: Record Proxmox VM and host state
          ansible.builtin.shell: |
            set -o errexit -o nounset -o pipefail
            shopt -s nullglob
            output={{ (hpl_result_root ~ '/' ~ hpl_effective_run_id ~ '/proxmox-state/before.txt') | quote }}
            {
              printf 'captured_utc='; date --utc --iso-8601=seconds
              printf '\n[vms]\n'; qm list
              printf '\n[temperatures]\n'; sensors 2>&1 || true
              for temperature in /sys/class/thermal/thermal_zone*/temp; do
                test -r "${temperature}" && printf '%s=%s\n' "${temperature}" "$(<"${temperature}")"
              done
              printf '\n[governors]\n'
              for governor in /sys/devices/system/cpu/cpufreq/policy*/scaling_governor; do
                test -r "${governor}" && printf '%s=%s\n' "${governor}" "$(<"${governor}")"
              done
            } > "${output}"
          args:
            executable: /bin/bash
          changed_when: false
          delegate_to: "{{ proxmox_host }}"
          become: true

        - name: Save Proxmox host governors
          ansible.builtin.shell: |
            set -o errexit -o nounset -o pipefail
            shopt -s nullglob
            governors=(/sys/devices/system/cpu/cpufreq/policy*/scaling_governor)
            test -n "${governors[*]-}"
            for governor in "${governors[@]}"; do
              test -r "${governor}" && printf '%s=%s\n' "${governor}" "$(<"${governor}")"
            done
          args:
            executable: /bin/bash
          register: hpl_proxmox_governors
          changed_when: false
          delegate_to: "{{ proxmox_host }}"
          become: true

        - name: Persist saved Proxmox governors for recovery
          ansible.builtin.copy:
            dest: "/tmp/hpl-governors-{{ hpl_effective_run_id }}"
            content: "{{ hpl_proxmox_governors.stdout }}\n"
            owner: root
            group: root
            mode: "0600"
          delegate_to: "{{ proxmox_host }}"
          become: true

        - name: Set Proxmox host governor to performance
          ansible.builtin.shell: |
            set -o errexit -o nounset -o pipefail
            shopt -s nullglob
            governors=(/sys/devices/system/cpu/cpufreq/policy*/scaling_governor)
            test -n "${governors[*]-}"
            for governor in "${governors[@]}"; do
              test -w "${governor}"
              printf '%s' performance > "${governor}"
              test "$(<"${governor}")" = performance
            done
          args:
            executable: /bin/bash
          changed_when: true
          delegate_to: "{{ proxmox_host }}"
          become: true

        - name: Find utility-01 VM identifier
          ansible.builtin.shell: |
            set -o errexit -o nounset -o pipefail
            qm list | awk '$2 == "utility-01" { print $1; exit }'
          args:
            executable: /bin/bash
          register: hpl_utility_vmid
          changed_when: false
          delegate_to: "{{ proxmox_host }}"
          become: true

        - name: Require utility-01 to exist on pve-01
          ansible.builtin.assert:
            that:
              - hpl_utility_vmid.stdout is match('^[0-9]+$')
            fail_msg: "Could not identify utility-01 with qm list; refusing isolation."

        - name: Read utility-01 initial state
          ansible.builtin.command:
            argv:
              - qm
              - status
              - "{{ hpl_utility_vmid.stdout }}"
          register: hpl_utility_initial_state
          changed_when: false
          delegate_to: "{{ proxmox_host }}"
          become: true

        - name: Remember whether utility-01 was running
          ansible.builtin.set_fact:
            hpl_utility_was_running: "{{ 'status: running' in hpl_utility_initial_state.stdout }}"

        - name: Shut down utility-01 for isolated measurement
          ansible.builtin.command:
            argv:
              - qm
              - shutdown
              - "{{ hpl_utility_vmid.stdout }}"
              - --timeout
              - "180"
          when: hpl_utility_was_running
          changed_when: true
          delegate_to: "{{ proxmox_host }}"
          become: true

        - name: Wait for utility-01 to stop
          ansible.builtin.command:
            argv:
              - qm
              - status
              - "{{ hpl_utility_vmid.stdout }}"
          register: hpl_utility_stopped
          until: "'status: stopped' in hpl_utility_stopped.stdout"
          retries: 30
          delay: 5
          changed_when: false
          when: hpl_utility_was_running
          delegate_to: "{{ proxmox_host }}"
          become: true

        - name: Read initial k3s service states
          ansible.builtin.command:
            argv:
              - systemctl
              - is-active
              - "{{ hostvars[item].hpl_k3s_service }}"
          loop: "{{ hpl_stop_order }}"
          loop_control:
            label: "{{ item }}"
          register: hpl_k3s_service_states
          changed_when: false
          failed_when: false
          delegate_to: "{{ item }}"
          become: true

        - name: Stop active k3s agents, then the control plane
          ansible.builtin.systemd_service:
            name: "{{ hostvars[item.item].hpl_k3s_service }}"
            state: stopped
          loop: "{{ hpl_k3s_service_states.results }}"
          loop_control:
            label: "{{ item.item }}"
          when: item.stdout == 'active'
          delegate_to: "{{ item.item }}"
          become: true

        - name: Characterize block sizes by CPU family
          ansible.builtin.include_tasks: tasks/hpl-characterize-host.yml
          loop:
            - k8s-worker-01
            - okd-cp-01
          loop_control:
            loop_var: hpl_target
            label: "{{ hpl_target }}"

        - name: Select best Intel block size by median GFLOPS
          ansible.builtin.command:
            argv:
              - "{{ hpl_install_root }}/bin/hpl-runner"
              - select-nb
              - --result-dir
              - "{{ hpl_result_root }}/{{ hpl_effective_run_id }}"
          register: hpl_k3s_best_nb_command
          changed_when: false
          delegate_to: k8s-worker-01
          become: true
          become_user: "{{ hpl_benchmark_user }}"

        - name: Select best Ryzen block size by median GFLOPS
          ansible.builtin.command:
            argv:
              - "{{ hpl_install_root }}/bin/hpl-runner"
              - select-nb
              - --result-dir
              - "{{ hpl_result_root }}/{{ hpl_effective_run_id }}"
          register: hpl_baremetal_best_nb_command
          changed_when: false
          delegate_to: okd-cp-01
          become: true
          become_user: "{{ hpl_benchmark_user }}"

        - name: Store selected block sizes
          ansible.builtin.set_fact:
            hpl_k3s_best_nb: "{{ hpl_k3s_best_nb_command.stdout | int }}"
            hpl_baremetal_best_nb: "{{ hpl_baremetal_best_nb_command.stdout | int }}"

        - name: Run standard and tuned-capacity cases on every node
          ansible.builtin.include_tasks: tasks/hpl-isolated-node.yml
          loop: "{{ groups['benchmark_all'] }}"
          loop_control:
            loop_var: hpl_target
            label: "{{ hpl_target }}"
          vars:
            hpl_selected_nb: >-
              {{ hpl_k3s_best_nb if hpl_target in groups['benchmark_k3s'] else hpl_baremetal_best_nb }}

        - name: Run Ryzen 6-core versus 12-thread pilot
          ansible.builtin.include_role:
            name: hpl
            tasks_from: run_case
          vars:
            hpl_delegate: okd-cp-01
            hpl_case_label: isolated-smt-pilot-12-thread
            hpl_case_stage: isolated-pilot
            hpl_case_comparison: smt-pilot
            hpl_case_target: okd-cp-01-12-thread
            hpl_case_cpu_family: amd-ryzen-5-pro-5650ge
            hpl_case_n: 21504
            hpl_case_nb: 192
            hpl_case_ranks: 12
            hpl_case_core_count: 6
            hpl_case_p: 3
            hpl_case_q: 4
            hpl_case_binding: hwthread
            hpl_case_warmups: 1
            hpl_case_runs: 5

        - name: Record pairwise latency and throughput before distributed HPL
          ansible.builtin.include_tasks: tasks/hpl-network-group.yml
          loop: "{{ hpl_network_groups }}"
          loop_control:
            loop_var: hpl_network_group
            label: "{{ hpl_network_group.name }}"

        - name: Create temporary distributed-MPI credentials
          ansible.builtin.include_tasks: tasks/hpl-setup-group-ssh.yml
          loop:
            - benchmark_k3s
            - benchmark_baremetal
          loop_control:
            loop_var: hpl_benchmark_group
            label: "{{ hpl_benchmark_group }}"

        - name: Run standard and tuned-capacity distributed cases
          ansible.builtin.include_tasks: tasks/hpl-isolated-group.yml
          loop:
            - benchmark_k3s
            - benchmark_baremetal
          loop_control:
            loop_var: hpl_benchmark_group
            label: "{{ hpl_benchmark_group }}"
          vars:
            hpl_selected_nb: >-
              {{ hpl_k3s_best_nb if hpl_benchmark_group == 'benchmark_k3s' else hpl_baremetal_best_nb }}

      rescue:
        - name: Remember isolated benchmark failure for the final gate
          ansible.builtin.set_fact:
            hpl_isolated_failed: true

        - name: Report transition to recovery
          ansible.builtin.debug:
            msg: >-
              The isolated benchmark failed. Recovery and collection will run
              before the playbook returns a failure.

      always:
        - name: Remove temporary distributed authorization from all benchmark nodes
          block:
            - name: Delete distributed authorization entries
              ansible.builtin.lineinfile:
                path: "/home/{{ hpl_benchmark_user }}/.ssh/authorized_keys"
                regexp: " hpl-benchmark-{{ hpl_effective_run_id | regex_escape }}-(benchmark_k3s|benchmark_baremetal)$"
                state: absent
              loop: "{{ groups['benchmark_all'] }}"
              loop_control:
                label: "{{ item }}"
              delegate_to: "{{ item }}"
              become: true
              no_log: true
          rescue:
            - name: Mark failed distributed authorization cleanup
              ansible.builtin.set_fact:
                hpl_isolated_failed: true

        - name: Remove temporary coordinator keys and hostfiles
          block:
            - name: Delete distributed launch credential artifacts
              ansible.builtin.include_tasks: tasks/hpl-remove-group-ssh.yml
              loop:
                - benchmark_k3s
                - benchmark_baremetal
              loop_control:
                loop_var: hpl_benchmark_group
                label: "{{ hpl_benchmark_group }}"
          rescue:
            - name: Mark failed coordinator credential cleanup
              ansible.builtin.set_fact:
                hpl_isolated_failed: true

        - name: Restore Proxmox host governors
          ansible.builtin.shell: |
            set -o nounset -o pipefail
            state_file={{ ('/tmp/hpl-governors-' ~ hpl_effective_run_id) | quote }}
            test -r "${state_file}" || exit 1
            while IFS='=' read -r governor value; do
              test -w "${governor}" || exit 1
              printf '%s' "${value}" > "${governor}"
              test "$(<"${governor}")" = "${value}" || exit 1
            done < "${state_file}"
          args:
            executable: /bin/bash
          register: hpl_governor_restore
          changed_when: true
          failed_when: false
          delegate_to: "{{ proxmox_host }}"
          become: true

        - name: Remove saved Proxmox governor state
          ansible.builtin.file:
            path: "/tmp/hpl-governors-{{ hpl_effective_run_id }}"
            state: absent
          delegate_to: "{{ proxmox_host }}"
          become: true
          failed_when: false

        - name: Restore utility-01 to its initial running state
          ansible.builtin.command:
            argv:
              - qm
              - start
              - "{{ (hpl_utility_vmid | default({'stdout': ''})).stdout }}"
          when:
            - hpl_utility_was_running | default(false) | bool
            - "(hpl_utility_vmid | default({'stdout': ''})).stdout is match('^[0-9]+$')"
          register: hpl_utility_restore
          changed_when: true
          failed_when: false
          delegate_to: "{{ proxmox_host }}"
          become: true

        - name: Wait for restored utility-01 SSH
          ansible.builtin.wait_for:
            host: "{{ hostvars[groups['utility'][0]].ansible_host }}"
            port: 22
            delay: 5
            timeout: 300
          when: hpl_utility_was_running | default(false) | bool
          register: hpl_utility_ssh_restore
          failed_when: false

        - name: Restore k3s control plane, then agents
          ansible.builtin.systemd_service:
            name: "{{ hostvars[item.item].hpl_k3s_service }}"
            state: started
          loop: "{{ hpl_k3s_service_states.results | default([]) | reverse | list }}"
          loop_control:
            label: "{{ item.item }}"
          when: item.stdout | default('') == 'active'
          register: hpl_k3s_service_restore
          delegate_to: "{{ item.item }}"
          become: true
          failed_when: false

        - name: Wait for every Kubernetes node to recover Ready
          ansible.builtin.command:
            argv:
              - k3s
              - kubectl
              - wait
              - --for=condition=Ready
              - nodes
              - --all
              - --timeout=300s
          register: hpl_nodes_recovered
          changed_when: false
          failed_when: false
          delegate_to: "{{ groups['k3s_control'][0] }}"
          become: true

        - name: Read recovered Kubernetes node set
          ansible.builtin.command:
            argv:
              - k3s
              - kubectl
              - get
              - nodes
              - -o
              - name
          register: hpl_recovered_node_set
          changed_when: false
          failed_when: false
          delegate_to: "{{ groups['k3s_control'][0] }}"
          become: true

        - name: Wait for every Argo CD application to recover Synced and Healthy
          ansible.builtin.shell: |
            set -o errexit -o nounset -o pipefail
            applications="$(k3s kubectl -n argocd get applications.argoproj.io \
              --no-headers \
              -o custom-columns=NAME:.metadata.name,SYNC:.status.sync.status,HEALTH:.status.health.status)"
            test -n "${applications}"
            printf '%s\n' "${applications}"
            awk '$2 != "Synced" || $3 != "Healthy" { failed=1 } END { exit failed }' <<< "${applications}"
          args:
            executable: /bin/bash
          register: hpl_argocd_recovered
          retries: 30
          delay: 10
          until: hpl_argocd_recovered.rc == 0
          changed_when: false
          failed_when: false
          delegate_to: "{{ groups['k3s_control'][0] }}"
          become: true

        - name: Record restored Proxmox VM and host state
          ansible.builtin.shell: |
            set -o errexit -o nounset -o pipefail
            shopt -s nullglob
            output={{ (hpl_result_root ~ '/' ~ hpl_effective_run_id ~ '/proxmox-state/after.txt') | quote }}
            {
              printf 'captured_utc='; date --utc --iso-8601=seconds
              printf '\n[vms]\n'; qm list
              printf '\n[temperatures]\n'; sensors 2>&1 || true
              for temperature in /sys/class/thermal/thermal_zone*/temp; do
                test -r "${temperature}" && printf '%s=%s\n' "${temperature}" "$(<"${temperature}")"
              done
              printf '\n[governors]\n'
              for governor in /sys/devices/system/cpu/cpufreq/policy*/scaling_governor; do
                test -r "${governor}" && printf '%s=%s\n' "${governor}" "$(<"${governor}")"
              done
            } > "${output}"
          args:
            executable: /bin/bash
          register: hpl_proxmox_after_capture
          changed_when: false
          failed_when: false
          delegate_to: "{{ proxmox_host }}"
          become: true

        - name: Capture post-recovery k3s state
          block:
            - name: Capture recovered k3s state
              ansible.builtin.include_role:
                name: hpl
                tasks_from: capture_k3s
              vars:
                hpl_capture_label: isolated-after-recovery
          rescue:
            - name: Mark failed recovered k3s capture
              ansible.builtin.set_fact:
                hpl_isolated_failed: true

        - name: Capture post-recovery benchmark host state
          ansible.builtin.include_tasks: tasks/hpl-capture-host-safe.yml
          loop: "{{ groups['benchmark_all'] }}"
          loop_control:
            loop_var: hpl_capture_host
            label: "{{ hpl_capture_host }}"

        - name: Record recovery validation status
          ansible.builtin.set_fact:
            hpl_isolated_failed: >-
              {{
                hpl_isolated_failed | bool
                or (hpl_governor_restore.rc | default(1) != 0)
                or (hpl_utility_restore.rc | default(0) != 0)
                or (hpl_utility_ssh_restore.failed | default(false) | bool)
                or (hpl_k3s_service_restore.failed | default(false) | bool)
                or (hpl_nodes_recovered.rc | default(1) != 0)
                or (hpl_recovered_node_set.rc | default(1) != 0)
                or (hpl_recovered_node_set.stdout_lines | default([]) | length != groups['k3s_cluster'] | length)
                or (hpl_argocd_recovered.rc | default(1) != 0)
                or (hpl_proxmox_after_capture.rc | default(1) != 0)
              }}

        - name: Store isolated run validation on the control node
          block:
            - name: Write isolated validation record remotely
              ansible.builtin.copy:
                dest: "{{ hpl_result_root }}/{{ hpl_effective_run_id }}/run-validation.json"
                content: >-
                  {{
                    {
                      'valid': not (hpl_isolated_failed | bool),
                      'invalid_reasons': (
                        []
                        if not (hpl_isolated_failed | bool)
                        else ['isolated benchmark or mandatory recovery acceptance failed']
                      )
                    } | to_nice_json
                  }}
                owner: root
                group: root
                mode: "0640"
              delegate_to: "{{ groups['k3s_control'][0] }}"
              become: true
          rescue:
            - name: Mark failed validation-record persistence
              ansible.builtin.set_fact:
                hpl_isolated_failed: true

        - name: Store isolated run validation for sanitized reporting
          ansible.builtin.copy:
            dest: "{{ hostvars['localhost'].hpl_local_result_dir }}/run-validation.json"
            content: >-
              {{
                {
                  'valid': not (hpl_isolated_failed | bool),
                  'invalid_reasons': (
                    []
                    if not (hpl_isolated_failed | bool)
                    else ['isolated benchmark or mandatory recovery acceptance failed']
                  )
                } | to_nice_json
              }}
            mode: "0640"

- name: Collect raw results and build sanitized summaries
  hosts: >-
    {{
      'benchmark_k3s'
      if ('live' in ansible_run_tags
          and 'smoke' not in ansible_run_tags
          and 'isolated' not in ansible_run_tags)
      else (
        'benchmark_all'
        if ('smoke' in ansible_run_tags
            and 'isolated' not in ansible_run_tags)
        else 'benchmark_all:proxmox'
      )
    }}
  gather_facts: false
  tags:
    - collect
    - smoke
    - live
    - isolated
  vars:
    hpl_effective_run_id: "{{ hostvars['localhost'].hpl_effective_run_id }}"
    hpl_local_result_dir: "{{ hostvars['localhost'].hpl_local_result_dir }}"
    hpl_collection_result_root: "{{ hpl_result_root | default('/var/lib/hpl-results') }}"
    hpl_remote_archive: "/tmp/hpl-results-{{ hpl_effective_run_id }}-{{ inventory_hostname }}.tar.gz"
  tasks:
    - name: Check for host results in this run
      ansible.builtin.stat:
        path: "{{ hpl_collection_result_root }}/{{ hpl_effective_run_id }}"
      register: hpl_host_result_directory
      become: true

    - name: Create raw host result directory locally
      ansible.builtin.file:
        path: "{{ hpl_local_result_dir }}/raw/{{ inventory_hostname }}"
        state: directory
        mode: "0750"
      delegate_to: localhost
      become: false
      when: hpl_host_result_directory.stat.exists

    - name: Archive raw host results
      ansible.builtin.command:
        argv:
          - tar
          - -C
          - "{{ hpl_collection_result_root }}/{{ hpl_effective_run_id }}"
          - -czf
          - "{{ hpl_remote_archive }}"
          - .
      changed_when: true
      become: true
      when: hpl_host_result_directory.stat.exists

    - name: Fetch raw host result archive
      ansible.builtin.fetch:
        src: "{{ hpl_remote_archive }}"
        dest: "{{ hpl_local_result_dir }}/raw/{{ inventory_hostname }}.tar.gz"
        flat: true
      become: true
      when: hpl_host_result_directory.stat.exists

    - name: Extract raw host results locally
      ansible.builtin.command:
        argv:
          - tar
          - -xzf
          - "{{ hpl_local_result_dir }}/raw/{{ inventory_hostname }}.tar.gz"
          - -C
          - "{{ hpl_local_result_dir }}/raw/{{ inventory_hostname }}"
      changed_when: true
      delegate_to: localhost
      become: false
      when: hpl_host_result_directory.stat.exists

    - name: Remove remote temporary result archive
      ansible.builtin.file:
        path: "{{ hpl_remote_archive }}"
        state: absent
      become: true
      when: hpl_host_result_directory.stat.exists


- name: Build sanitized HPL summaries after collection
  hosts: localhost
  connection: local
  gather_facts: false
  tags:
    - collect
    - smoke
    - live
    - isolated
  vars:
    hpl_effective_run_id: "{{ hostvars['localhost'].hpl_effective_run_id }}"
    hpl_local_result_dir: "{{ hostvars['localhost'].hpl_local_result_dir }}"
  tasks:
    - name: Install local sanitized-summary helper
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../roles/hpl/files/summarize_hpl.py"
        dest: "{{ hpl_local_result_dir }}/summarize_hpl.py"
        mode: "0750"

    - name: Generate sanitized CSV and Markdown summaries
      ansible.builtin.command:
        argv:
          - python3
          - "{{ hpl_local_result_dir }}/summarize_hpl.py"
          - --result-dir
          - "{{ hpl_local_result_dir }}"
          - --run-id
          - "{{ hpl_effective_run_id }}"
      changed_when: true

- name: Remove stale benchmark credentials and temporary archives
  hosts: benchmark_all
  gather_facts: false
  become: true
  tags:
    - cleanup
  tasks:
    - name: Run HPL transient cleanup
      ansible.builtin.include_role:
        name: hpl
        tasks_from: cleanup

- name: Enforce isolated benchmark and recovery acceptance
  hosts: localhost
  connection: local
  gather_facts: false
  tags:
    - isolated
  tasks:
    - name: Fail after recovery and result collection when isolation was invalid
      ansible.builtin.assert:
        that:
          - not hostvars['localhost'].hpl_isolated_failed | default(true) | bool
        fail_msg: >-
          The isolated benchmark or mandatory recovery validation failed.
          Review benchmark-results/{{ hostvars['localhost'].hpl_effective_run_id }}.
