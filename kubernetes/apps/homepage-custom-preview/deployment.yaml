apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage-custom-preview
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage-custom
    app.kubernetes.io/instance: preview
    app.kubernetes.io/component: dashboard
spec:
  replicas: 2
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage-custom
      app.kubernetes.io/instance: preview
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage-custom
        app.kubernetes.io/instance: preview
        app.kubernetes.io/component: dashboard
    spec:
      serviceAccountName: homepage-custom-k3s-reader
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: homepage-custom
              app.kubernetes.io/instance: preview
      containers:
        - name: homepage
          image: ghcr.io/seandre/k8s-homelab-homepage:unpoller-pdu-20260720-3@sha256:d75558ed538c832d9f51259d022511619e44aac1af5d7c6c059d85ef97297dc5
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: HOMEPAGE_RUNTIME_MODE
              value: production
            - name: LIVE_TELEMETRY
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: preview-runtime-config
              mountPath: /etc/homepage-preview
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: argocd-credentials
              mountPath: /var/run/homepage-secrets/argocd
              readOnly: true
            - name: pve01-credentials
              mountPath: /var/run/homepage-secrets/pve01
              readOnly: true
            - name: pve02-credentials
              mountPath: /var/run/homepage-secrets/pve02
              readOnly: true
            - name: pbs-credentials
              mountPath: /var/run/homepage-secrets/pbs
              readOnly: true
            - name: unifi-credentials
              mountPath: /var/run/homepage-secrets/unifi
              readOnly: true
      volumes:
        - name: preview-runtime-config
          configMap:
            name: homepage-custom-preview
        - name: tmp
          emptyDir:
            medium: Memory
        # Optional while all live adapters remain disabled. Enabling an adapter
        # later makes its corresponding Secret required by that adapter only.
        - name: argocd-credentials
          secret:
            secretName: homepage-argocd-readonly
            optional: true
        - name: pve01-credentials
          secret:
            secretName: homepage-proxmox-pve01
            optional: true
        - name: pve02-credentials
          secret:
            secretName: homepage-proxmox-pve02
            optional: true
        - name: pbs-credentials
          secret:
            secretName: homepage-pbs-readonly
            optional: true
        - name: unifi-credentials
          secret:
            secretName: homepage-unifi-readonly
            optional: true
