apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  settings.yaml: |
    title: Homelab
    theme: dark
    color: slate
    headerStyle: clean
    layout:
      Infrastructure:
        style: row
        columns: 3
      Apps:
        style: row
        columns: 3
  services.yaml: |
    - Infrastructure:
        - Argo CD:
            href: https://argocd.lab.seandre.dev
            description: GitOps control plane
            icon: argo-cd.png
        - Grafana:
            href: https://grafana.lab.seandre.dev
            description: Cluster dashboards
            icon: grafana.png
        - Proxmox:
            href: https://pve-01.lab.seandre.dev:8006
            description: Virtualization host
            icon: proxmox.png
            widget:
              type: glances
              url: http://192.168.40.20:61208
              version: 4
              metric: info
              refreshInterval: 5000
        - UniFi:
            href: https://unifi.ui.com
            description: Network management
            icon: unifi.png
    - Apps:
        - Homelab Docs:
            href: https://docs.lab.seandre.dev
            description: Infrastructure documentation and runbooks
            icon: docusaurus.png
        - nginx test:
            href: https://nginx-test.lab.seandre.dev
            description: Ingress test app
            icon: nginx.png
  bookmarks.yaml: |
    - Homelab:
        - Repository:
            - abbr: GH
              href: https://github.com/seandre/k8s-homelab
        - Homepage Docs:
            - abbr: HP
              href: https://gethomepage.dev/
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: Cluster
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        label: Homepage Pod
        expanded: true
        cpu: true
        memory: true
        disk: /
        uptime: true
    - search:
        provider: duckduckgo
        target: _blank
    - datetime:
        text_size: xl
        format:
          dateStyle: short
          timeStyle: short
          hour12: true
  kubernetes.yaml: |
    mode: cluster
    ingress: false
  docker.yaml: ""
  proxmox.yaml: ""
  custom.css: ""
  custom.js: ""
