apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: homepage-host-exporters
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  jobName: homepage-host-exporters
  metricsPath: /metrics
  scrapeInterval: 15s
  scrapeTimeout: 5s
  scheme: http
  # Intentionally inert until node_exporter and the host firewall are verified
  # on every target. Replace this empty list with the Git-owned target catalog
  # documented in homepage-observability.md as one reviewed activation change.
  staticConfigs: []
