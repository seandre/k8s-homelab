apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: home-assistant-indoor
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  jobName: home-assistant-indoor
  metricsPath: /api/prometheus
  scrapeInterval: 30s
  scrapeTimeout: 10s
  scheme: http
  authorization:
    type: Bearer
    credentials:
      name: home-assistant-indoor-prometheus
      key: token
  staticConfigs:
    - targets:
        - home-assistant.home-assistant.svc.cluster.local:8123
  metricRelabelings:
    # Home Assistant exposes only the normalized entity allowlist. This second
    # boundary prevents its process/info collectors or future exporter defaults
    # from entering the indoor history store.
    - sourceLabels:
        - __name__
      action: keep
      regex: indoor_(aranet_(temperature_fahrenheit|humidity_percent|pressure_hpa|co2_ppm|battery_percent)|nest_(temperature_fahrenheit|humidity_percent)|coway_(living_room|bedroom)_(aqi|pm25_micrograms_m3|pm10_micrograms_m3|filter_life_percent))
