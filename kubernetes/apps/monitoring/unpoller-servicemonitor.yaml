apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: unpoller
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: unpoller
  endpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 10s
      metricRelabelings:
        # Retain only the fixed UDM Pro dashboard catalog and PDU outlet power;
        # high-cardinality client and radio series are dropped at ingestion.
        - sourceLabels:
            - __name__
          action: keep
          regex: unpoller_device_(outlet_outlet_power|wan_(receive_rate_bytes|transmit_rate_bytes|receive_bytes_total|transmit_bytes_total)|uplink_latency_seconds|cpu_utilization_ratio|memory_utilization_ratio|temperature_celsius|uptime_seconds|stations)
