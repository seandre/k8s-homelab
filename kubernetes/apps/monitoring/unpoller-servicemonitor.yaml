apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: unpoller
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: unpoller
  endpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 10s
      metricRelabelings:
        # `up` is retained by Prometheus as scrape health. Every collected
        # UniFi metric other than outlet power is dropped at ingestion.
        - sourceLabels:
            - __name__
          action: keep
          regex: unpoller_device_outlet_outlet_power
