          - event: indoor_alert_notification
            event_data: {incident: temperature, level: critical, path: /indoor}
    
      - id: indoor_alert_temperature_recovery
        alias: Indoor alerts - temperature recovery
        mode: single
        trigger:
          - platform: template
            value_template: >-
              {% set entity = 'sensor.indoor_aranet_temperature' %}
              {% set value = states(entity) | float(none) %}
              {{ value is not none and state_attr(entity, 'freshness') == 'CURRENT' and (62 <= value <= 78) }}
            for: "00:15:00"
        condition: "{{ states('input_select.indoor_alert_temperature') != 'ok' }}"
        action:
          - service: input_select.select_option
            target: {entity_id: input_select.indoor_alert_temperature}
            data: {option: ok}
          - event: indoor_alert_notification
            event_data: {incident: temperature, level: recovery, path: /indoor}
    
      - id: indoor_alert_humidity_warning
        alias: Indoor alerts - humidity warning
