                event_data: {incident: pm25_living_room, level: warning, path: /indoor}
          - service: input_select.select_option
            target: {entity_id: input_select.indoor_alert_pm25_living_room}
            data: {option: critical}
          - event: indoor_alert_notification
            event_data: {incident: pm25_living_room, level: critical, path: /indoor}
    
      - id: indoor_alert_pm25_living_room_recovery
        alias: Indoor alerts - pm25_living_room recovery
        mode: single
        trigger:
          - platform: template
            value_template: >-
              {% set entity = 'sensor.indoor_coway_living_room_pm25' %}
              {% set value = states(entity) | float(none) %}
              {{ value is not none and state_attr(entity, 'freshness') == 'CURRENT' and (value < 10) }}
            for: "00:15:00"
        condition: "{{ states('input_select.indoor_alert_pm25_living_room') != 'ok' }}"
        action:
