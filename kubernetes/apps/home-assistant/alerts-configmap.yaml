            value_template: >-
              {% set entity = 'sensor.indoor_aranet_temperature' %}
              {% set value = states(entity) | float(none) %}
              {{ value is not none and state_attr(entity, 'freshness') == 'CURRENT' and (value < 55 or value > 85) }}
            for: "00:10:00"
        condition: "{{ states('input_select.indoor_alert_temperature') != 'critical' }}"
        action:
          - if: "{{ states('input_select.indoor_alert_temperature') == 'ok' }}"
            then:
              - event: indoor_alert_notification
                event_data: {incident: temperature, level: warning, path: /indoor}
          - service: input_select.select_option
            target: {entity_id: input_select.indoor_alert_temperature}
