              {{ value is not none and state_attr(entity, 'freshness') == 'CURRENT' and (value < 30 or value > 60) }}
            for: "00:30:00"
        condition: "{{ states('input_select.indoor_alert_humidity') == 'ok' }}"
        action:
          - service: input_select.select_option
            target: {entity_id: input_select.indoor_alert_humidity}
            data: {option: warning}
          - event: indoor_alert_notification
            event_data: {incident: humidity, level: warning, path: /indoor}
    
      - id: indoor_alert_humidity_critical
        alias: Indoor alerts - humidity critical
        mode: single
        trigger:
          - platform: template
            value_template: >-
              {% set entity = 'sensor.indoor_aranet_humidity' %}
              {% set value = states(entity) | float(none) %}
              {{ value is not none and state_attr(entity, 'freshness') == 'CURRENT' and (value < 20 or value > 70) }}
            for: "00:15:00"
        condition: "{{ states('input_select.indoor_alert_humidity') != 'critical' }}"
