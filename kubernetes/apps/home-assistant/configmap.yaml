apiVersion: v1
kind: ConfigMap
metadata:
  name: home-assistant-bootstrap
  namespace: home-assistant
  labels:
    app.kubernetes.io/name: home-assistant
data:
  configuration.yaml: |
    # IE-004 Git-owned bootstrap. Runtime state remains under /config/.storage.
    default_config:

    homeassistant:
      name: Home
      unit_system: metric
      time_zone: America/Los_Angeles
      country: US
      currency: USD
      packages: !include_dir_named packages

    http:
      use_x_forwarded_for: true
      trusted_proxies:
        # k3s default pod CIDR; NetworkPolicy separately limits ingress to Traefik.
        - 10.42.0.0/16
