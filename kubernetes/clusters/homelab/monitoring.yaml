apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 87.3.0
    helm:
      releaseName: kube-prometheus-stack
      values: |
        alertmanager:
          enabled: true

        grafana:
          enabled: true
          admin:
            existingSecret: grafana-admin-credentials
            userKey: admin-user
            passwordKey: admin-password
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-production
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
            hosts:
              - grafana.lab.seandre.dev
            tls:
              - secretName: grafana-public-tls
                hosts:
                  - grafana.lab.seandre.dev

        # k3s exposes these control-plane components differently from the
        # upstream kubeadm discovery model. Their default ServiceMonitor
        # targets are absent, so keep them disabled rather than alerting on
        # intentionally nonexistent endpoints.
        kubeControllerManager:
          enabled: false

        kubeProxy:
          enabled: false

        kubeScheduler:
          enabled: false

        prometheus:
          prometheusSpec:
            # Homepage history depends on Prometheus surviving StatefulSet
            # replacement. local-path is intentionally node-local; treat this
            # as durable telemetry cache, not a host-loss backup.
            retention: 30d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes:
                    - ReadWriteOnce
                  storageClassName: local-path
                  resources:
                    requests:
                      storage: 50Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
